services:
  chromadb:
    image: chromadb/chroma
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data:/chroma/chroma
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.macos.backend
    container_name: rag_backend
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chromadb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rag_frontend
    ports:
      - "7860:7860"
    volumes:
      - .:/app
    depends_on:
      - backend